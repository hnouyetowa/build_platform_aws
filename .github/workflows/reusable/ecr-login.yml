# PETPLAT-53: Reusable ECR login workflow
#
# Authenticates Docker to ECR via OIDC (no long-lived credentials).
# Call from any workflow with:
#
#   jobs:
#     login:
#       uses: {owner}/ratp-platform/.github/workflows/reusable/ecr-login.yml@main
#       with:
#         aws_region: eu-central-1
#         aws_role_arn: ${{ secrets.AWS_ROLE_ARN }}
#         aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
#       secrets: inherit

name: Reusable ECR Login

on:
  workflow_call:
    inputs:
      aws_region:
        description: "AWS region where ECR is hosted"
        type: string
        default: "eu-central-1"
      aws_role_arn:
        description: "OIDC IAM role ARN to assume"
        type: string
        required: true
      aws_account_id:
        description: "AWS account ID (used to construct ECR registry URL)"
        type: string
        required: true
    outputs:
      registry:
        description: "ECR registry URL (e.g. 123456789012.dkr.ecr.eu-central-1.amazonaws.com)"
        value: ${{ jobs.login.outputs.registry }}

jobs:
  login:
    name: Configure AWS + ECR login
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.login.outputs.registry }}

    permissions:
      id-token: write   # required for OIDC token request
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}
          # No aws-access-key-id or aws-secret-access-key — OIDC only

      - name: Login to Amazon ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: ${{ inputs.aws_account_id }}
