# PETPLAT-45: Dev overlay — 1 replica per service, petclinic-dev namespace
# These settings inform helm-values/dev.yaml (E-16/PETPLAT-109).
# Apply with: kubectl apply -k k8s/overlays/dev/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: petclinic-dev

resources:
  - ../../base/namespaces.yaml
  - ../../base/config-server
  - ../../base/discovery-server
  - ../../base/api-gateway
  - ../../base/customers-service
  - ../../base/visits-service
  - ../../base/vets-service
  - ../../base/genai-service
  - ../../base/admin-server

patches:
  - path: replica-patch.yaml
    target:
      kind: Deployment
