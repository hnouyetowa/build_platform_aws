# PETPLAT-46: Prod overlay — HA replicas, petclinic-prod namespace
# These settings inform helm-values/prod.yaml (E-16/PETPLAT-109).
# Apply with: kubectl apply -k k8s/overlays/prod/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: petclinic-prod

resources:
  - ../../base/namespaces.yaml
  - ../../base/config-server
  - ../../base/discovery-server
  - ../../base/api-gateway
  - ../../base/customers-service
  - ../../base/visits-service
  - ../../base/vets-service
  - ../../base/genai-service
  - ../../base/admin-server
  - hpa-api-gateway.yaml
  - hpa-customers-service.yaml
  - hpa-visits-service.yaml
  - hpa-vets-service.yaml
  - hpa-genai-service.yaml

patches:
  - path: replica-patch.yaml
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/component in (server,gateway)"
  - path: replica-patch-domain.yaml
    target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/component=service"
