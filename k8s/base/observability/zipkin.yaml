---
# PETPLAT-60: Zipkin — distributed tracing in dedicated 'tracing' namespace
# Services send traces to: http://zipkin.tracing:9411/api/v2/spans
# (enforcement rule — namespace must be "tracing")
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zipkin
  namespace: tracing
  labels:
    app.kubernetes.io/name: zipkin
    app.kubernetes.io/part-of: petclinic-observability
    app.kubernetes.io/component: tracing
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zipkin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zipkin
        app.kubernetes.io/part-of: petclinic-observability
        app.kubernetes.io/component: tracing
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: zipkin
          image: openzipkin/zipkin:3.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9411
              protocol: TCP
          env:
            - name: STORAGE_TYPE
              value: mem     # In-memory for dev; swap to Elasticsearch for prod
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx512m"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: zipkin
  namespace: tracing
  labels:
    app.kubernetes.io/name: zipkin
    app.kubernetes.io/part-of: petclinic-observability
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: zipkin
  ports:
    - name: http
      port: 9411
      targetPort: http
      protocol: TCP
