---
# PETPLAT-57: Petclinic Service Overview Dashboard
# Shows all services: up/down status, RPS, error rate
# datasource.uid is fixed to "prometheus" (enforcement rule)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-overview
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: petclinic-observability
    grafana_dashboard: "1"
data:
  petclinic-overview.json: |
    {
      "id": null,
      "uid": "petclinic-overview",
      "title": "Petclinic Service Overview",
      "description": "All 5 instrumented services: up/down, RPS, error rate",
      "tags": ["petclinic", "overview"],
      "timezone": "browser",
      "refresh": "30s",
      "schemaVersion": 38,
      "time": {"from": "now-1h", "to": "now"},
      "panels": [
        {
          "id": 1,
          "title": "Service Up/Down",
          "type": "stat",
          "gridPos": {"h": 4, "w": 12, "x": 0, "y": 0},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "reduceOptions": {"calcs": ["lastNotNull"]}
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "green", "value": 1}
                ]
              },
              "mappings": [
                {"options": {"0": {"color": "red", "text": "DOWN"}}, "type": "value"},
                {"options": {"1": {"color": "green", "text": "UP"}}, "type": "value"}
              ]
            }
          },
          "targets": [
            {
              "expr": "up{job=~\"api-gateway|customers-service|visits-service|vets-service|genai-service\"}",
              "legendFormat": "{{job}}",
              "datasource": {"type": "prometheus", "uid": "prometheus"}
            }
          ]
        },
        {
          "id": 2,
          "title": "Request Rate (RPS) — All Services",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"unit": "reqps", "color": {"mode": "palette-classic"}}
          },
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}},
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count[5m])) by (job)",
              "legendFormat": "{{job}}",
              "datasource": {"type": "prometheus", "uid": "prometheus"}
            }
          ]
        },
        {
          "id": 3,
          "title": "5xx Error Rate — All Services",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 0.01},
                  {"color": "red", "value": 0.05}
                ]
              }
            }
          },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{status=~\"5..\"}[5m])) by (job) / sum(rate(http_server_requests_seconds_count[5m])) by (job)",
              "legendFormat": "{{job}}",
              "datasource": {"type": "prometheus", "uid": "prometheus"}
            }
          ]
        }
      ]
    }
