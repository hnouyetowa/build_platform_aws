---
# PETPLAT-55: Prometheus — scrapes only the 5 domain/gateway services
# config-server, discovery-server, admin-server are excluded (enforcement rule)
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: petclinic-observability
data:
  prometheus.yml: |
    global:
      scrape_interval:     15s
      evaluation_interval: 15s

    # Alertmanager integration (PETPLAT-103)
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager.monitoring:9093

    rule_files:
      - /etc/prometheus/rules/alert-rules.yaml

    scrape_configs:
      # ── Domain and gateway services only ──────────────────────────────────
      # Excluded: config-server, discovery-server, admin-server
      - job_name: api-gateway
        metrics_path: /actuator/prometheus
        scrape_interval: 15s
        static_configs:
          - targets: ['api-gateway.petclinic-dev:8080']

      - job_name: customers-service
        metrics_path: /actuator/prometheus
        scrape_interval: 15s
        static_configs:
          - targets: ['customers-service.petclinic-dev:8081']

      - job_name: visits-service
        metrics_path: /actuator/prometheus
        scrape_interval: 15s
        static_configs:
          - targets: ['visits-service.petclinic-dev:8082']

      - job_name: vets-service
        metrics_path: /actuator/prometheus
        scrape_interval: 15s
        static_configs:
          - targets: ['vets-service.petclinic-dev:8083']

      - job_name: genai-service
        metrics_path: /actuator/prometheus
        scrape_interval: 15s
        static_configs:
          - targets: ['genai-service.petclinic-dev:8084']

  alert-rules.yaml: |
    groups:
      - name: petclinic.rules
        interval: 15s
        rules:
          - alert: ServiceDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Service {{ $labels.job }} is down"
              description: "{{ $labels.instance }} has been unreachable for more than 1 minute."

          - alert: HighErrorRate
            expr: >
              rate(http_server_requests_seconds_count{status=~"5.."}[5m])
              /
              rate(http_server_requests_seconds_count[5m]) > 0.05
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High 5xx error rate on {{ $labels.job }}"
              description: "Error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

          - alert: HighLatency
            expr: histogram_quantile(0.95, rate(http_server_requests_seconds_bucket[5m])) > 0.5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High p95 latency on {{ $labels.job }}"
              description: "p95 latency is {{ $value | humanizeDuration }} (threshold: 500ms)."

          - alert: PodRestartLoop
            expr: increase(kube_pod_container_status_restarts_total[15m]) > 3
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.pod }} is in a restart loop"
              description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} restarted {{ $value }} times in the last 15 minutes."

          - alert: HighMemoryUsage
            expr: container_memory_working_set_bytes / container_spec_memory_limit_bytes > 0.8
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory usage in pod {{ $labels.pod }}"
              description: "Memory usage is {{ $value | humanizePercentage }} of limit."
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-storage
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: petclinic-observability
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp2
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: petclinic-observability
automountServiceAccountToken: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: petclinic-observability
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
        app.kubernetes.io/part-of: petclinic-observability
        app.kubernetes.io/component: monitoring
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v2.47.2
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=7d
            - --web.enable-lifecycle
            - --web.console.libraries=/usr/share/prometheus/console_libraries
            - --web.console.templates=/usr/share/prometheus/consoles
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: storage
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: storage
          persistentVolumeClaim:
            claimName: prometheus-storage
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: petclinic-observability
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
      protocol: TCP
