---
# ALB Ingress for the Petclinic API Gateway (PETPLAT-30)
# Managed by: ArgoCD (via Helm chart in E-16/E-17)
#
# BEFORE APPLYING:
#   1. Replace <ACM_CERTIFICATE_ARN> with: terraform output -raw certificate_arn
#   2. Replace <NAMESPACE> with petclinic-dev or petclinic-prod
#
# ALB is provisioned automatically by the AWS Load Balancer Controller
# when this manifest is applied. Get the ALB DNS for Route 53 A record:
#   kubectl get ingress api-gateway -n <NAMESPACE> \
#     -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway
  namespace: <NAMESPACE>
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: petclinic
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: gateway
  annotations:
    # ALB controller annotations — see: https://kubernetes-sigs.github.io/aws-load-balancer-controller/
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/certificate-arn: "<ACM_CERTIFICATE_ARN>"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health
    alb.ingress.kubernetes.io/healthcheck-port: "8080"
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "10"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    alb.ingress.kubernetes.io/security-groups: ""  # ALB controller manages its own SG
    alb.ingress.kubernetes.io/tags: >-
      Project=petclinic,
      ManagedBy=terraform
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
