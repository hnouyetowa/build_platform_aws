apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: config-server-prod
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: ratb
    environment: prod
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default

  source:
    repoURL: https://github.com/ratb/ratb-platform.git
    targetRevision: main
    path: helm/ratb-service
    helm:
      releaseName: config-server
      valueFiles:
        - ../../helm-values/config-server.yaml
        - ../../helm-values/prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: ratb-prod

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
