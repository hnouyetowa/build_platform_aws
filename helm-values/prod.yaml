# Prod environment overrides — merged with per-service values by ArgoCD
# Domain services: 2+ replicas, HPA enabled, PDB enabled
replicaCount: 2

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Overrides per-service image repository to use prod ECR repos
# (the per-service files default to petclinic-dev — ArgoCD overrides to prod)
# image:
#   repository: AWS_ACCOUNT_ID.dkr.ecr.eu-central-1.amazonaws.com/prod/SERVICE_NAME
