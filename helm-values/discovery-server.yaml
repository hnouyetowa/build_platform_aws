image:
  repository: "AWS_ACCOUNT_ID.dkr.ecr.eu-central-1.amazonaws.com/ratp-dev/discovery-server"
  tag: "latest"
  pullPolicy: Always

service:
  port: 8761

env:
  - name: SPRING_PROFILES_ACTIVE
    value: "docker"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

initContainers:
  - name: wait-for-config-server
    image: busybox:1.36
    command: ['sh', '-c', 'until wget -qO- http://config-server:8888/actuator/health; do echo "waiting..."; sleep 5; done']
